<html lang="zh-CN">

<title>FinTax 时间维度分析看板 | 2026-03-28</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2e3e;--text:#e4e6ef;--text-dim:#8b8fa3;--accent:#e17055;--green:#00b894;--red:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);padding:20px}
.back-link{display:inline-block;margin-bottom:20px;color:var(--accent);text-decoration:none;font-size:14px}
.back-link:hover{text-decoration:underline}
.container{max-width:1400px;margin:0 auto}
.header{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.header h1{font-size:24px;margin-bottom:8px}
.header h1 span{color:var(--accent)}
.header .meta{font-size:13px;color:var(--text-dim)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.stat-card .label{font-size:11px;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase}
.stat-card .value{font-size:28px;font-weight:700;color:var(--accent)}
.charts{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-card.full{grid-column:1/-1}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text-dim)}
.chart-container{height:350px}
.chart-container.tall{height:420px}
.heatmap-container{overflow-x:auto;margin-bottom:24px}
.heatmap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.heatmap h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text-dim)}
.heatmap-grid{display:grid;gap:3px}
.heatmap-cell{border-radius:3px;min-height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:default;transition:transform .15s}
.heatmap-cell:hover{transform:scale(1.1);z-index:1}
.heatmap-label{font-size:11px;color:var(--text-dim);display:flex;align-items:center;justify-content:center}
.insight-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.insight-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.insight-card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.insight-card p{font-size:13px;color:var(--text-dim);line-height:1.6}
@media(max-width:1024px){.stats{grid-template-columns:repeat(2,1fr)}.charts{grid-template-columns:1fr}.insight-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back-link">← 返回导航</a>
<div class="header">
<h1><span>🕐</span> 时间维度分析看板</h1>

<div id="heatmapGrid"></div>
</div>
</div>

  const hour = d.getHours();
  dayCount[day]++;

});

  heatData[key].total += t.views;
  heatData[key].count++;
});

  const d = day % 7;
  grid.innerHTML += `<div class="heatmap-label">周${days[d]}</div>`;

    const key = `${d}-${h}`;
    const val = heatData[key];
    const avg = val ? Math.round(val.total / val.count) : 0;
    const intensity = val ? (val.total / val.count) / maxAvg : 0;

    const g = Math.round(112 * intensity + 46 * (1-intensity));

  const d = new Date(dateStr);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}

  if (!weeklyData[w]) weeklyData[w] = {posts: 0, views: 0};
  weeklyData[w].posts++;
  weeklyData[w].views += t.views;
});

});

  }
});

// ===== 微信月度频率 vs 篇均阅读 =====
const wxMonthly = {};
wxData.forEach(t => {
  const parts = t.date.trim().split('/');
  const month = `${parts[0]}-${parts[1].padStart(2,'0')}`;
  if (!wxMonthly[month]) wxMonthly[month] = {count: 0, totalReads: 0};
  wxMonthly[month].count++;
  wxMonthly[month].totalReads += t.reads;
});
const wxMonths = Object.keys(wxMonthly).sort();
new Chart(document.getElementById('freqVsPerf'), {
  type: 'bar',
  data: {
    labels: wxMonths.map(m => {const [y,mo] = m.split('-'); return `${parseInt(mo)}月`;}),
    datasets: [
      {type: 'bar', label: '发布篇数', data: wxMonths.map(m => wxMonthly[m].count), backgroundColor: 'rgba(7,193,96,0.6)', borderRadius: 4, yAxisID: 'y'},
      {type: 'line', label: '篇均阅读', data: wxMonths.map(m => Math.round(wxMonthly[m].totalReads / wxMonthly[m].count)), borderColor: '#e17055', pointBackgroundColor: '#e17055', tension: 0.4, yAxisID: 'y1'}
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {legend: {labels: {color: '#8b8fa3'}}},
    scales: {
      x: {ticks: {color: '#8b8fa3'}, grid: {display: false}},
      y: {position: 'left', title: {display: true, text: '篇数', color: '#8b8fa3'}, ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}},
      y1: {position: 'right', title: {display: true, text: '篇均阅读', color: '#8b8fa3'}, ticks: {color: '#8b8fa3'}, grid: {display: false}}
    }
  }
});

// ===== 发布间隔 vs 阅读量 =====
const wxSorted = wxData.filter(a => a.reads > 0).map(t => {
  const parts = t.date.trim().split('/');
  return {...t, dateObj: new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]))};
}).sort((a,b) => a.dateObj - b.dateObj);

const gapData = [];
for (let i = 1; i < wxSorted.length; i++) {
  const gap = Math.round((wxSorted[i].dateObj - wxSorted[i-1].dateObj) / 86400000);
  if (gap > 0 && gap < 15) gapData.push({x: gap, y: wxSorted[i].reads});
}

new Chart(document.getElementById('gapVsReads'), {
  type: 'scatter',
  data: {
    datasets: [{
      label: '文章', data: gapData,
      backgroundColor: 'rgba(7,193,96,0.6)', borderColor: '#07c160',
      pointRadius: 5, pointHoverRadius: 8
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {legend: {display: false}},
    scales: {
      x: {title: {display: true, text: '距上篇间隔（天）', color: '#8b8fa3'}, ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}},
      y: {title: {display: true, text: '阅读量', color: '#8b8fa3'}, ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}}
    }
  }
});

// ===== 洞察 =====
document.getElementById('insights').innerHTML = `
<div class="insight-card">
  <h3>🕐 最佳发布时间</h3>
  <p>X 中文号的发布集中在工作日 8-16 时段，其中周${days[bestDay]}发布最频繁。从篇均浏览来看，${bestHour}:00 左右发布的内容表现最佳。</p>
</div>
<div class="insight-card">
  <h3>📅 发布频率建议</h3>
  <p>微信公众号在 11 月和 12 月（每月 10-12 篇）的篇均阅读量最高。过低频率（2-3月仅 6-7 篇）可能导致粉丝流失，建议保持每月 8+ 篇的节奏。</p>
</div>
<div class="insight-card">
  <h3>🔄 发布间隔洞察</h3>
  <p>散点图显示发布间隔在 2-3 天的文章表现较为稳定。间隔超过 5 天后表现波动增大，建议维持 2-4 天的发布节奏。</p>
</div>
`;
</script>
</body>
