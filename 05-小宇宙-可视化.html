<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTax 小宇宙播客可视化看板 | 2026-03-20</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2e3e;--text:#e4e6ef;--text-dim:#8b8fa3;--accent:#7b68ee;--green:#00b894}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);padding:20px}
.back-link{display:inline-block;margin-bottom:20px;color:var(--accent);text-decoration:none;font-size:14px}
.back-link:hover{text-decoration:underline}
.container{max-width:1400px;margin:0 auto}
.header{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.header h1{font-size:24px;margin-bottom:8px}
.header h1 span{color:var(--accent)}
.header .meta{font-size:13px;color:var(--text-dim)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-card .label{font-size:12px;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase}
.stat-card .value{font-size:32px;font-weight:700;color:var(--accent)}
.charts{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-card.full{grid-column:1/-1}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text-dim)}
.chart-container{height:300px}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back-link">← 返回导航</a>
<div class="header">
<h1><span>播</span> FinTax 小宇宙播客可视化看板</h1>
<div class="meta">数据更新于 2026-03-20 | 共 12 期节目</div>
</div>
<div class="stats" id="stats"></div>
<div class="charts">
<div class="chart-card full">
<h3>📈 播放量趋势</h3>
<div class="chart-container"><canvas id="playsTrend"></canvas></div>
</div>
<div class="chart-card">
<h3>�� 完播率分布</h3>
<div class="chart-container"><canvas id="completionChart"></canvas></div>
</div>
<div class="chart-card">
<h3>🔥 TOP节目播放量</h3>
<div class="chart-container"><canvas id="topEpisodes"></canvas></div>
</div>
</div>
</div>
<script>
const data = [{"title": "在英国与开曼群岛等传统离岸司法辖区纳入CARF信息交换后，常见的跨境持仓与账户安排还存在哪些可行的合", "date": "2026-02-16", "plays": 12, "completion": "12.5%", "shares": 0}, {"title": "CARF到底是什么，其核心背景是什么，目前中国大陆与香港地区的实施与推进情况如何？", "date": "2026-02-11", "plays": 9, "completion": "83.3%", "shares": 0}, {"title": "Q9+对香港税务居民而言，应如何应对CARF带来的信息收集与申报要求，与中国大陆税务居民相比关键差异", "date": "2026-02-09", "plays": 2, "completion": "100.0%", "shares": 0}, {"title": "Q8 人在国内做交易所合约BD，拉新返佣甚至吃客损合法吗，最可能被怎么定性？", "date": "2026-01-16", "plays": 28, "completion": "50.0%", "shares": 1}, {"title": "Q6 监管再强调与税务收紧是否意味着国内Web3进入冷冻期，行业还能怎么发展？", "date": "2026-01-12", "plays": 20, "completion": "42.9%", "shares": 1}, {"title": "Q5 涉币事项里，纳税义务、行政处罚与刑事责任是并行还是有先后关系？", "date": "2026-01-10", "plays": 9, "completion": "57.1%", "shares": 1}, {"title": "Q4 加密货币在国内不被不合法是否就意味着不用纳税？征税逻辑如何？", "date": "2026-01-08", "plays": 12, "completion": "71.4%", "shares": 2}, {"title": "Q3 2025年两轮针对境外收入的征管行动说明了什么趋势，Web3从业者需要警惕什么？", "date": "2026-01-06", "plays": 8, "completion": "60.0%", "shares": 1}, {"title": "Q2 在本轮监管重申下，个人参与Web3从业者面临什么影响？可能触发哪些法律风险与责任认定？", "date": "2026-01-03", "plays": 6, "completion": "40.0%", "shares": 1}, {"title": "Q1 央行等部门联席会议与行业风险提示再次点名虚拟货币与稳定币，释放了什么监管信号？", "date": "2025-12-30", "plays": 13, "completion": "77.8%", "shares": 2}, {"title": "Web3收入，要在国内缴税吗？—— 答疑专场", "date": "2025-12-05", "plays": 18, "completion": "36.4%", "shares": 1}, {"title": "CEX风控？币圈强合规和纳税真的来了？", "date": "2025-08-13", "plays": 12, "completion": "12.5%", "shares": 2}];
const totalPlays = data.reduce((s,e)=>s+e.plays,0);
const totalShares = data.reduce((s,e)=>s+e.shares,0);
const avgCompletion = (data.reduce((s,e)=>s+parseFloat(e.completion),0)/data.length).toFixed(1);

document.getElementById('stats').innerHTML = `
<div class="stat-card"><div class="label">节目总数</div><div class="value">12</div></div>
<div class="stat-card"><div class="label">总播放量</div><div class="value">${totalPlays.toLocaleString()}</div></div>
<div class="stat-card"><div class="label">总分享数</div><div class="value">${totalShares.toLocaleString()}</div></div>
<div class="stat-card"><div class="label">平均完播率</div><div class="value">${avgCompletion}%</div></div>
`;

new Chart(document.getElementById('playsTrend'), {
  type: 'line',
  data: {labels: data.map((e,i)=>`EP${i+1}`), datasets: [{label: '播放量', data: data.map(e=>e.plays), borderColor: '#7b68ee', backgroundColor: 'rgba(123,104,238,0.1)', tension: 0.4, fill: true}]},
  options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {labels: {color: '#8b8fa3'}}}, scales: {x: {ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}}, y: {ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}}}}
});

new Chart(document.getElementById('completionChart'), {
  type: 'bar',
  data: {labels: data.map((e,i)=>`EP${i+1}`), datasets: [{label: '完播率', data: data.map(e=>parseFloat(e.completion)), backgroundColor: 'rgba(123,104,238,0.7)', borderColor: '#7b68ee', borderWidth: 1}]},
  options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {labels: {color: '#8b8fa3'}}}, scales: {x: {ticks: {color: '#8b8fa3'}, grid: {display: false}}, y: {ticks: {color: '#8b8fa3', callback: v=>v+'%'}, grid: {color: '#2a2e3e'}}}}
});

const top = [...data].sort((a,b)=>b.plays-a.plays).slice(0,Math.min(10, data.length));
new Chart(document.getElementById('topEpisodes'), {
  type: 'bar',
  data: {labels: top.map((e,i)=>`#${i+1}`), datasets: [{label: '播放量', data: top.map(e=>e.plays), backgroundColor: 'rgba(123,104,238,0.7)', borderColor: '#7b68ee', borderWidth: 1}]},
  options: {indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}}, scales: {x: {ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}}, y: {ticks: {color: '#8b8fa3'}, grid: {display: false}}}}
});
</script>
</body>
</html>
