<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社媒数据看板 | FinTax</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #22263a;
    --border: #2a2e3e;
    --text: #e4e6ef;
    --text-dim: #8b8fa3;
    --accent: #6c5ce7;
    --green: #00b894;
    --red: #ff6b6b;
    --orange: #fdcb6e;
    --blue: #74b9ff;
    --pink: #fd79a8;
    --cyan: #81ecec;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height:100vh; }

  /* Header */
  .header { padding: 28px 40px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
  .header h1 { font-size:22px; font-weight:700; }
  .header h1 span { color: var(--accent); }
  .header .meta { font-size:13px; color:var(--text-dim); }
  .update-badge { background: var(--accent); color:#fff; font-size:11px; padding:3px 10px; border-radius:20px; margin-left:12px; }

  /* Layout */
  .container { max-width:1400px; margin:0 auto; padding:24px 40px 60px; }

  /* Overview row */
  .overview { display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; margin-bottom:28px; }
  .overview-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px 24px; transition: background .2s; }
  .overview-card:hover { background:var(--card-hover); }
  .overview-card .label { font-size:13px; color:var(--text-dim); margin-bottom:6px; }
  .overview-card .value { font-size:28px; font-weight:700; }
  .overview-card .change { font-size:12px; margin-top:4px; }
  .change.up { color:var(--green); }
  .change.down { color:var(--red); }

  /* Section title */
  .section-title { font-size:16px; font-weight:600; margin:28px 0 16px; padding-left:12px; border-left:3px solid var(--accent); }

  /* Platform cards */
  .platforms { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; margin-bottom:28px; }
  .platform-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:22px; transition: transform .2s, background .2s; }
  .platform-card:hover { background:var(--card-hover); transform:translateY(-2px); }
  .platform-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .platform-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:#fff; }
  .platform-name { font-size:15px; font-weight:600; }
  .platform-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .stat-item .stat-label { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; }
  .stat-item .stat-value { font-size:18px; font-weight:600; margin-top:2px; }
  .stat-item .stat-change { font-size:11px; margin-top:1px; }

  /* Charts grid */
  .charts-grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:28px; }
  .chart-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:22px; }
  .chart-card h3 { font-size:14px; font-weight:600; margin-bottom:16px; color:var(--text-dim); }
  .chart-card.full { grid-column: 1 / -1; }

  /* Content table */
  .table-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:22px; overflow-x:auto; }
  .table-card h3 { font-size:14px; font-weight:600; margin-bottom:16px; color:var(--text-dim); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:10px 12px; color:var(--text-dim); font-weight:500; border-bottom:1px solid var(--border); font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
  td { padding:12px; border-bottom:1px solid var(--border); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background: rgba(108,92,231,.06); }
  .platform-tag { display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:500; }
  .rank { width:28px; height:28px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; }
  .rank-1 { background: linear-gradient(135deg,#f6d365,#fda085); color:#333; }
  .rank-2 { background: linear-gradient(135deg,#a8edea,#fed6e3); color:#333; }
  .rank-3 { background: linear-gradient(135deg,#d4fc79,#96e6a1); color:#333; }
  .rank-other { background: var(--border); color: var(--text-dim); }

  /* Footer */
  .footer { text-align:center; padding:24px; font-size:12px; color:var(--text-dim); }

  /* Tabs */
  .tab-bar { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .tab { padding:6px 16px; border-radius:8px; font-size:13px; cursor:pointer; background:var(--card); border:1px solid var(--border); color:var(--text-dim); transition: all .2s; }
  .tab:hover { background:var(--card-hover); color:var(--text); }
  .tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  @media (max-width:1024px) {
    .overview { grid-template-columns: repeat(2,1fr); }
    .platforms { grid-template-columns: repeat(2,1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .container { padding:20px; }
    .header { padding:20px; }
  }
  @media (max-width:640px) {
    .overview { grid-template-columns: 1fr; }
    .platforms { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span>FinTax</span> 社媒数据看板</h1>
  </div>
  <div class="meta">
    数据更新于 <strong id="updateDate"></strong>
    <span class="update-badge">每周更新</span>
  </div>
</div>

<div class="container">

  <!-- ========== 汇总概览 ========== -->
  <div class="overview" id="overviewCards"></div>

  <!-- ========== 平台卡片 ========== -->
  <div class="section-title">各平台数据</div>
  <div class="platforms" id="platformCards"></div>

  <!-- ========== 趋势图表 ========== -->
  <div class="section-title">数据趋势</div>
  <div class="charts-grid">
    <div class="chart-card full">
      <h3>粉丝增长趋势（近12周）</h3>
      <canvas id="followerChart" height="80"></canvas>
    </div>
    <div class="chart-card">
      <h3>各平台互动率对比</h3>
      <canvas id="engagementChart" height="160"></canvas>
    </div>
    <div class="chart-card">
      <h3>内容发布量（近4周）</h3>
      <canvas id="contentChart" height="160"></canvas>
    </div>
  </div>

  <!-- ========== 内容排行榜 ========== -->
  <div class="section-title">本周内容排行 TOP 10</div>
  <div class="tab-bar" id="contentTabs"></div>
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th>平台</th>
          <th>内容标题</th>
          <th style="text-align:right">浏览/播放</th>
          <th style="text-align:right">点赞</th>
          <th style="text-align:right">评论</th>
          <th style="text-align:right">分享/转发</th>
          <th style="text-align:right">互动率</th>
        </tr>
      </thead>
      <tbody id="contentTable"></tbody>
    </table>
  </div>
</div>

<div class="footer">FinTax 社媒数据看板 · 部署于 GitHub Pages · 数据由团队手动维护</div>

<script>
// =====================================================================
//  📊 数据区 — 每次更新只需修改这部分内容
// =====================================================================

const DATA = {
  updateDate: "2026-03-20",

  // ---------- 各平台数据 ----------
  platforms: {
    "X (Twitter)": {
      color: "#1da1f2",
      icon: "𝕏",
      followers: 12800,
      followersChange: 5.2,
      views: 385000,
      viewsChange: 12.3,
      likes: 9600,
      comments: 1820,
      shares: 3200,
      engagementRate: 3.8,
      postsThisMonth: 24
    },
    "微信公众号": {
      color: "#07c160",
      icon: "微",
      followers: 46500,
      followersChange: 2.1,
      views: 128000,
      viewsChange: -3.5,
      likes: 4200,
      comments: 860,
      shares: 2100,
      engagementRate: 5.6,
      postsThisMonth: 12
    },
    "LinkedIn": {
      color: "#0077b5",
      icon: "in",
      followers: 8900,
      followersChange: 8.7,
      views: 210000,
      viewsChange: 15.6,
      likes: 6800,
      comments: 920,
      shares: 1850,
      engagementRate: 4.6,
      postsThisMonth: 16
    },
    "抖音": {
      color: "#fe2c55",
      icon: "抖",
      followers: 35200,
      followersChange: 12.4,
      views: 1560000,
      viewsChange: 22.8,
      likes: 68000,
      comments: 4200,
      shares: 8500,
      engagementRate: 5.2,
      postsThisMonth: 20
    },
    "小宇宙": {
      color: "#7b68ee",
      icon: "播",
      followers: 3200,
      followersChange: 15.6,
      views: 28000,
      viewsChange: 18.2,
      likes: 1200,
      comments: 380,
      shares: 450,
      engagementRate: 7.3,
      postsThisMonth: 4
    },
    "YouTube": {
      color: "#ff0000",
      icon: "▶",
      followers: 5600,
      followersChange: 6.8,
      views: 92000,
      viewsChange: 9.4,
      likes: 3800,
      comments: 620,
      shares: 980,
      engagementRate: 5.9,
      postsThisMonth: 8
    }
  },

  // ---------- 粉丝趋势（近12周）----------
  followerTrend: {
    labels: ["W1","W2","W3","W4","W5","W6","W7","W8","W9","W10","W11","W12"],
    datasets: {
      "X": [10200,10500,10800,11000,11300,11500,11800,12000,12100,12300,12500,12800],
      "公众号": [42000,42500,43000,43500,44000,44200,44500,45000,45300,45800,46100,46500],
      "LinkedIn": [6500,6700,6900,7100,7300,7600,7800,8000,8200,8400,8600,8900],
      "抖音": [22000,23500,25000,26500,28000,29000,30000,31200,32500,33500,34500,35200],
      "小宇宙": [1800,1950,2050,2200,2350,2450,2550,2700,2800,2900,3050,3200],
      "YouTube": [3800,4000,4200,4400,4500,4700,4800,5000,5100,5200,5400,5600]
    }
  },

  // ---------- 内容排行榜 ----------
  topContent: [
    { platform:"抖音", title:"2026年个税新政解读：这3个变化和你息息相关", views:520000, likes:28000, comments:1800, shares:4200, engagementRate:6.5 },
    { platform:"抖音", title:"自由职业者如何合规节税？5分钟讲清楚", views:380000, likes:21000, comments:1200, shares:3100, engagementRate:6.7 },
    { platform:"X", title:"Thread: 2026 Tax Filing Season - 10 Things You Must Know", views:125000, likes:3800, comments:420, shares:1600, engagementRate:4.7 },
    { platform:"YouTube", title:"【完整教程】小微企业季度报税全流程", views:45000, likes:2100, comments:380, shares:520, engagementRate:6.7 },
    { platform:"微信公众号", title:"深度｜跨境电商税务合规指南2026版", views:38000, likes:1800, comments:260, shares:1200, engagementRate:8.6 },
    { platform:"LinkedIn", title:"Why Tax Automation Is the Next Big Thing in FinTech", views:35000, likes:1600, comments:220, shares:480, engagementRate:6.6 },
    { platform:"小宇宙", title:"EP42. 和税务律师聊聊：年终奖怎么拿最划算", views:8500, likes:620, comments:180, shares:210, engagementRate:11.9 },
    { platform:"微信公众号", title:"一文看懂：增值税留抵退税最新政策", views:32000, likes:1400, comments:180, shares:860, engagementRate:7.6 },
    { platform:"LinkedIn", title:"3 Lessons from Building a Tax-Tech Startup", views:28000, likes:1200, comments:185, shares:320, engagementRate:6.1 },
    { platform:"抖音", title:"报税季常见的5个坑，千万别踩！", views:260000, likes:15000, comments:980, shares:2200, engagementRate:7.0 }
  ]
};

// =====================================================================
//  以下是渲染逻辑，一般不需要修改
// =====================================================================

const fmt = (n) => {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 10000) return (n/10000).toFixed(1) + '万';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
};

const platformColors = {};
Object.entries(DATA.platforms).forEach(([name, d]) => { platformColors[name] = d.color; });
const shortName = (n) => n.replace(' (Twitter)','');

// Update date
document.getElementById('updateDate').textContent = DATA.updateDate;

// ---- Overview cards ----
const pList = Object.values(DATA.platforms);
const totalFollowers = pList.reduce((s,p) => s + p.followers, 0);
const totalViews = pList.reduce((s,p) => s + p.views, 0);
const totalLikes = pList.reduce((s,p) => s + p.likes, 0);
const totalPosts = pList.reduce((s,p) => s + p.postsThisMonth, 0);
const avgEngagement = (pList.reduce((s,p) => s + p.engagementRate, 0) / pList.length).toFixed(1);

const overviewData = [
  { label:"全平台粉丝总数", value: fmt(totalFollowers), change:"+6.2%", up:true },
  { label:"本月总浏览/播放", value: fmt(totalViews), change:"+14.8%", up:true },
  { label:"本月总互动（赞+评+转）", value: fmt(totalLikes + pList.reduce((s,p)=>s+p.comments+p.shares,0)), change:"+11.3%", up:true },
  { label:"平均互动率", value: avgEngagement + "%", change:"较上月 +0.4pp", up:true }
];
document.getElementById('overviewCards').innerHTML = overviewData.map(d => `
  <div class="overview-card">
    <div class="label">${d.label}</div>
    <div class="value">${d.value}</div>
    <div class="change ${d.up?'up':'down'}">${d.change}</div>
  </div>
`).join('');

// ---- Platform cards ----
document.getElementById('platformCards').innerHTML = Object.entries(DATA.platforms).map(([name, d]) => `
  <div class="platform-card">
    <div class="platform-header">
      <div class="platform-icon" style="background:${d.color}">${d.icon}</div>
      <div class="platform-name">${name}</div>
    </div>
    <div class="platform-stats">
      <div class="stat-item">
        <div class="stat-label">粉丝</div>
        <div class="stat-value">${fmt(d.followers)}</div>
        <div class="stat-change ${d.followersChange>=0?'up':'down'}" style="color:${d.followersChange>=0?'var(--green)':'var(--red)'}">
          ${d.followersChange>=0?'↑':'↓'} ${Math.abs(d.followersChange)}%
        </div>
      </div>
      <div class="stat-item">
        <div class="stat-label">浏览/播放</div>
        <div class="stat-value">${fmt(d.views)}</div>
        <div class="stat-change ${d.viewsChange>=0?'up':'down'}" style="color:${d.viewsChange>=0?'var(--green)':'var(--red)'}">
          ${d.viewsChange>=0?'↑':'↓'} ${Math.abs(d.viewsChange)}%
        </div>
      </div>
      <div class="stat-item">
        <div class="stat-label">点赞</div>
        <div class="stat-value">${fmt(d.likes)}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">评论</div>
        <div class="stat-value">${fmt(d.comments)}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">分享/转发</div>
        <div class="stat-value">${fmt(d.shares)}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">互动率</div>
        <div class="stat-value" style="color:var(--green)">${d.engagementRate}%</div>
      </div>
    </div>
  </div>
`).join('');

// ---- Follower trend chart ----
const trendColors = ["#1da1f2","#07c160","#0077b5","#fe2c55","#7b68ee","#ff0000"];
const trendNames = Object.keys(DATA.followerTrend.datasets);
new Chart(document.getElementById('followerChart'), {
  type: 'line',
  data: {
    labels: DATA.followerTrend.labels,
    datasets: trendNames.map((name, i) => ({
      label: name,
      data: DATA.followerTrend.datasets[name],
      borderColor: trendColors[i],
      backgroundColor: trendColors[i] + '18',
      fill: false,
      tension: 0.35,
      pointRadius: 3,
      pointHoverRadius: 6,
      borderWidth: 2
    }))
  },
  options: {
    responsive: true,
    plugins: { legend: { labels: { color: '#8b8fa3', font:{size:12} } } },
    scales: {
      x: { ticks:{color:'#8b8fa3'}, grid:{color:'#2a2e3e'} },
      y: { ticks:{color:'#8b8fa3', callback: v => fmt(v)}, grid:{color:'#2a2e3e'} }
    }
  }
});

// ---- Engagement bar chart ----
const engNames = Object.keys(DATA.platforms);
const engValues = engNames.map(n => DATA.platforms[n].engagementRate);
const engColors = engNames.map(n => DATA.platforms[n].color);
new Chart(document.getElementById('engagementChart'), {
  type: 'bar',
  data: {
    labels: engNames.map(shortName),
    datasets: [{
      data: engValues,
      backgroundColor: engColors.map(c => c + 'cc'),
      borderColor: engColors,
      borderWidth: 1,
      borderRadius: 6,
      barPercentage: 0.6
    }]
  },
  options: {
    responsive: true,
    plugins: { legend:{display:false}, tooltip:{ callbacks:{ label: ctx => ctx.parsed.y + '%' } } },
    scales: {
      x: { ticks:{color:'#8b8fa3',font:{size:11}}, grid:{display:false} },
      y: { ticks:{color:'#8b8fa3', callback: v => v+'%'}, grid:{color:'#2a2e3e'} }
    }
  }
});

// ---- Content publish count chart ----
const pubLabels = ["第1周","第2周","第3周","第4周"];
const pubData = {};
Object.keys(DATA.platforms).forEach(n => {
  const total = DATA.platforms[n].postsThisMonth;
  const base = Math.floor(total / 4);
  pubData[n] = [base, base, base+1, total - base*3 -1];
});
new Chart(document.getElementById('contentChart'), {
  type: 'bar',
  data: {
    labels: pubLabels,
    datasets: Object.keys(pubData).map((name, i) => ({
      label: shortName(name),
      data: pubData[name],
      backgroundColor: Object.values(DATA.platforms)[i].color + '99',
      borderRadius: 4,
      barPercentage: 0.7
    }))
  },
  options: {
    responsive: true,
    plugins: { legend: { labels:{color:'#8b8fa3',font:{size:11}} } },
    scales: {
      x: { stacked:true, ticks:{color:'#8b8fa3'}, grid:{display:false} },
      y: { stacked:true, ticks:{color:'#8b8fa3'}, grid:{color:'#2a2e3e'} }
    }
  }
});

// ---- Content ranking table ----
const allPlatforms = ["全部", ...new Set(DATA.topContent.map(c => c.platform))];
let currentFilter = "全部";

function renderTabs() {
  document.getElementById('contentTabs').innerHTML = allPlatforms.map(p =>
    `<div class="tab ${p===currentFilter?'active':''}" onclick="filterContent('${p}')">${p}</div>`
  ).join('');
}

function filterContent(platform) {
  currentFilter = platform;
  renderTabs();
  renderTable();
}

function renderTable() {
  const filtered = currentFilter === "全部" ? DATA.topContent : DATA.topContent.filter(c => c.platform === currentFilter);
  const sorted = [...filtered].sort((a,b) => b.views - a.views);
  document.getElementById('contentTable').innerHTML = sorted.map((c, i) => {
    const rankClass = i < 3 ? `rank-${i+1}` : 'rank-other';
    const pColor = Object.entries(DATA.platforms).find(([n]) => n.includes(c.platform))?.[1]?.color || '#6c5ce7';
    return `<tr>
      <td><span class="rank ${rankClass}">${i+1}</span></td>
      <td><span class="platform-tag" style="background:${pColor}22;color:${pColor}">${c.platform}</span></td>
      <td style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title}</td>
      <td style="text-align:right;font-weight:600">${fmt(c.views)}</td>
      <td style="text-align:right">${fmt(c.likes)}</td>
      <td style="text-align:right">${fmt(c.comments)}</td>
      <td style="text-align:right">${fmt(c.shares)}</td>
      <td style="text-align:right;color:var(--green);font-weight:600">${c.engagementRate}%</td>
    </tr>`;
  }).join('');
}

renderTabs();
renderTable();
</script>
</body>
</html>
