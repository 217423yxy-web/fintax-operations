const top10 = [...data].sort((a,b)=>b.views-a.views).slice(0,10);
new Chart(document.getElementById('topTweets'), {
  type: 'bar',
  data: {
    labels: top10.map((t,i)=>`#${i+1}`),
    datasets: [{
      label: '浏览量',
      data: top10.map(t=>t.views),
      backgroundColor: 'rgba(29,161,242,0.7)',
      borderColor: '#1DA1F2',
      borderWidth: 1
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#8b8fa3' }, grid: { color: '#2a2e3e' } },
      y: { ticks: { color: '#8b8fa3' }, grid: { display: false } }
    }
  }
});
</script>
