<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTax 私信管理可视化看板 | 2026-03-20</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2e3e;--text:#e4e6ef;--text-dim:#8b8fa3;--accent:#9b59b6;--green:#00b894;--red:#e74c3c;--blue:#3498db}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);padding:20px}
.header{max-width:1400px;margin:0 auto 30px;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.header h1{font-size:24px;margin-bottom:8px}
.header h1 span{color:var(--accent)}
.header .meta{font-size:13px;color:var(--text-dim)}
.back-link{display:inline-block;margin-bottom:20px;color:var(--accent);text-decoration:none;font-size:14px}
.back-link:hover{text-decoration:underline}
.container{max-width:1400px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-card .label{font-size:12px;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase}
.stat-card .value{font-size:32px;font-weight:700;color:var(--accent)}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(500px,1fr));gap:24px;margin-top:24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.chart-title{font-size:16px;font-weight:600;margin-bottom:20px;color:var(--text)}
canvas{max-height:300px}
</style>
</head>
<body>

<div class="container">
<a href="index.html" class="back-link">← 返回导航</a>

<div class="header">
<h1><span>💬</span> FinTax 私信管理可视化看板</h1>
<div class="meta">数据更新于 2026-03-20 | 共 17 条私信</div>
</div>

<div class="stats">
<div class="stat-card">
<div class="label">私信总数</div>
<div class="value">17</div>
</div>
<div class="stat-card">
<div class="label">合作邀约</div>
<div class="value">8</div>
</div>
<div class="stat-card">
<div class="label">垃圾信息</div>
<div class="value">5</div>
</div>
<div class="stat-card">
<div class="label">待回复</div>
<div class="value">4</div>
</div>
</div>

<div class="charts">
<div class="chart-card">
<div class="chart-title">📊 月度私信趋势</div>
<canvas id="monthlyChart"></canvas>
</div>

<div class="chart-card">
<div class="chart-title">📈 私信类型分布</div>
<canvas id="typeChart"></canvas>
</div>

<div class="chart-card">
<div class="chart-title">🎯 优先级分布</div>
<canvas id="priorityChart"></canvas>
</div>

<div class="chart-card">
<div class="chart-title">📅 时间分布热力图</div>
<canvas id="timeChart"></canvas>
</div>
</div>

</div>

<script>
// Chart.js 全局配置
Chart.defaults.color = '#8b8fa3';
Chart.defaults.borderColor = '#2a2e3e';
Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif';

// 月度私信趋势
const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
new Chart(monthlyCtx, {
    type: 'line',
    data: {
        labels: ['10月', '11月', '12月', '1月', '2月', '3月'],
        datasets: [{
            label: '私信数量',
            data: [2, 1, 4, 1, 8, 1],
            borderColor: '#9b59b6',
            backgroundColor: 'rgba(155, 89, 182, 0.1)',
            tension: 0.4,
            fill: true
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
            legend: {
                display: false
            }
        },
        scales: {
            y: {
                beginAtZero: true,
                ticks: {
                    stepSize: 2
                }
            }
        }
    }
});

// 私信类型分布
const typeCtx = document.getElementById('typeChart').getContext('2d');
new Chart(typeCtx, {
    type: 'doughnut',
    data: {
        labels: ['合作邀约', '垃圾信息', '咨询问题', '其他'],
        datasets: [{
            data: [8, 5, 2, 2],
            backgroundColor: [
                '#9b59b6',
                '#e74c3c',
                '#3498db',
                '#95a5a6'
            ]
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
            legend: {
                position: 'bottom'
            }
        }
    }
});

// 优先级分布
const priorityCtx = document.getElementById('priorityChart').getContext('2d');
new Chart(priorityCtx, {
    type: 'bar',
    data: {
        labels: ['高优先级', '中优先级', '低优先级', '垃圾信息'],
        datasets: [{
            label: '数量',
            data: [3, 5, 4, 5],
            backgroundColor: [
                '#e74c3c',
                '#f39c12',
                '#3498db',
                '#95a5a6'
            ]
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
            legend: {
                display: false
            }
        },
        scales: {
            y: {
                beginAtZero: true,
                ticks: {
                    stepSize: 1
                }
            }
        }
    }
});

// 时间分布
const timeCtx = document.getElementById('timeChart').getContext('2d');
new Chart(timeCtx, {
    type: 'bar',
    data: {
        labels: ['2025-10', '2025-11', '2025-12', '2026-01', '2026-02', '2026-03'],
        datasets: [{
            label: '合作邀约',
            data: [0, 1, 2, 0, 4, 1],
            backgroundColor: '#9b59b6'
        }, {
            label: '垃圾信息',
            data: [2, 0, 2, 1, 0, 0],
            backgroundColor: '#e74c3c'
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
            legend: {
                position: 'bottom'
            }
        },
        scales: {
            x: {
                stacked: true
            },
            y: {
                stacked: true,
                beginAtZero: true
            }
        }
    }
});
</script>

</body>
</html>
