*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);padding:20px}
.back-link{display:inline-block;margin-bottom:20px;color:var(--accent);text-decoration:none;font-size:14px}
.back-link:hover{text-decoration:underline}
.container{max-width:1400px;margin:0 auto}
.header{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.header h1{font-size:24px;margin-bottom:8px}
.header h1 span{color:var(--accent)}
.header .meta{font-size:13px;color:var(--text-dim)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.stat-card .label{font-size:11px;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase}
.stat-card .value{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .sub{font-size:11px;color:var(--text-dim);margin-top:4px}
.charts{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-card.full{grid-column:1/-1}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text-dim)}
.chart-container{height:350px}
.chart-container.tall{height:420px}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.table-card h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text-dim)}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
th{color:var(--text-dim);font-weight:500;text-transform:uppercase;font-size:11px}
.badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;color:#fff}
.insight-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.insight-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.insight-card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.insight-card p{font-size:13px;color:var(--text-dim);line-height:1.6}
@media(max-width:1024px){.stats{grid-template-columns:repeat(2,1fr)}.charts{grid-template-columns:1fr}.insight-grid{grid-template-columns:1fr}}
</style>
</head>

// ===== 内容分类逻辑 =====
function classifyArticle(title) {
  if (/动态精选|精选/.test(title)) return '周刊速递';
  if (/CARF|CRS|DAC8|信息交换/.test(title)) return 'CARF/CRS专题';
  if (/税制.*研究|监管.*研究|制度.*研究|一文读懂|一文解读|基础研究|制度概览|制度一览|详解/.test(title)) return '国别深度研究';
  if (/补税|追缴|税务调查|税务危机|缴税|纳税|税务监管|税收规则|税筹|税负|税务海关|税收听证/.test(title)) return '税务热点解读';
  if (/监管|SEC|牌照|新规|法案|法修订|框架|合规/.test(title)) return '监管政策解读';
  if (/Web3|U卡|支付|ETF|代币化|矿企|挖矿|质押|AI代理|RWA|稳定币/.test(title)) return '行业趋势分析';
  return '其他';
}

const typeColors = {
  '周刊速递': '#636e72',
  'CARF/CRS专题': '#e74c3c',
  '国别深度研究': '#0984e3',
  '税务热点解读': '#e17055',
  '监管政策解读': '#6c5ce7',
  '行业趋势分析': '#00cec9',
  '其他': '#b2bec3'
};

// 分类
const typeData = {};
articles.forEach(a => {
  if (a.reads === 0) return; // 过滤无效
  const type = classifyArticle(a.title);
  if (!typeData[type]) typeData[type] = {count: 0, totalReads: 0, totalShares: 0, totalLikes: 0, articles: []};
  typeData[type].count++;
  typeData[type].totalReads += a.reads;
  typeData[type].totalShares += a.shares;
  typeData[type].totalLikes += a.likes;
  typeData[type].articles.push(a);
});

const types = Object.keys(typeData).sort((a,b) => typeData[b].totalReads - typeData[a].totalReads);

// ===== KPI =====
const bestType = types[0];
const bestAvgType = types.reduce((best, t) => (typeData[t].totalReads/typeData[t].count) > (typeData[best].totalReads/typeData[best].count) ? t : best, types[0]);
const bestShareType = types.reduce((best, t) => (typeData[t].totalShares/typeData[t].count) > (typeData[best].totalShares/typeData[best].count) ? t : best, types[0]);

document.getElementById('stats').innerHTML = `
<div class="stat-card"><div class="label">内容类型数</div><div class="value">${types.length}</div></div>
<div class="stat-card"><div class="label">总阅读量最高</div><div class="value" style="font-size:18px">${bestType}</div><div class="sub">${typeData[bestType].totalReads.toLocaleString()} 阅读</div></div>
<div class="stat-card"><div class="label">篇均阅读最高</div><div class="value" style="font-size:18px">${bestAvgType}</div><div class="sub">${Math.round(typeData[bestAvgType].totalReads/typeData[bestAvgType].count)} 篇均</div></div>
<div class="stat-card"><div class="label">篇均分享最高</div><div class="value" style="font-size:18px">${bestShareType}</div><div class="sub">${(typeData[bestShareType].totalShares/typeData[bestShareType].count).toFixed(1)} 篇均</div></div>
`;

  type: 'doughnut',
  data: {
    labels: types,
    datasets: [{
      data: types.map(t => typeData[t].count),
      backgroundColor: types.map(t => typeColors[t] || '#b2bec3'),
      borderColor: '#1a1d27', borderWidth: 2
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {legend: {labels: {color: '#8b8fa3', usePointStyle: true, padding: 12}, position: 'right'}}
  }
});

// ===== 篇均阅读柱状图 =====
new Chart(document.getElementById('avgReads'), {
  type: 'bar',
  data: {
    labels: types,
    datasets: [{
      label: '篇均阅读量',
      data: types.map(t => Math.round(typeData[t].totalReads / typeData[t].count)),
      backgroundColor: types.map(t => (typeColors[t] || '#b2bec3') + 'cc'),
      borderColor: types.map(t => typeColors[t] || '#b2bec3'),
      borderWidth: 1, borderRadius: 6
    }]
  },
  options: {
    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
    plugins: {legend: {display: false}},
    scales: {x: {ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}}, y: {ticks: {color: '#8b8fa3', font: {size: 11}}, grid: {display: false}}}
  }
});

const bubbleDatasets = types.map(t => ({
  label: t,
  data: typeData[t].articles.map(a => ({x: a.reads, y: a.shares, r: Math.max(3, Math.sqrt(a.likes + 1) * 4)})),
  backgroundColor: (typeColors[t] || '#b2bec3') + '80',
  borderColor: typeColors[t] || '#b2bec3'
}));

new Chart(document.getElementById('bubbleChart'), {
  type: 'bubble',
  data: {datasets: bubbleDatasets},
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {legend: {labels: {color: '#8b8fa3', usePointStyle: true, padding: 12}}},
    scales: {
      x: {title: {display: true, text: '阅读量', color: '#8b8fa3'}, ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}},
      y: {title: {display: true, text: '分享量', color: '#8b8fa3'}, ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}}
    }
  }
});

    plugins: {legend: {display: false}},

// ===== 篇均分享 =====
new Chart(document.getElementById('avgShares'), {
  type: 'bar',
  data: {
    labels: types,
    datasets: [{
      label: '篇均分享', data: types.map(t => +(typeData[t].totalShares / typeData[t].count).toFixed(1)),
      backgroundColor: types.map(t => (typeColors[t] || '#b2bec3') + 'cc'),
      borderRadius: 6
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {legend: {display: false}},
    scales: {x: {ticks: {color: '#8b8fa3', font: {size: 10}}, grid: {display: false}}, y: {ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}}}
  }
});

// ===== 详细表格 =====
const tbody = document.querySelector('#typeTable tbody');
types.forEach(t => {
  const d = typeData[t];
  const row = document.createElement('tr');
  row.innerHTML = `
    <td><span class="badge" style="background:${typeColors[t]||'#b2bec3'}">${t}</span></td>
    <td>${d.count}</td>
    <td>${d.totalReads.toLocaleString()}</td>
    <td>${Math.round(d.totalReads/d.count)}</td>
    <td>${d.totalShares}</td>
    <td>${(d.totalShares/d.count).toFixed(1)}</td>
    <td>${d.totalLikes}</td>
  `;
  tbody.appendChild(row);
});

document.getElementById('insights').innerHTML = `
