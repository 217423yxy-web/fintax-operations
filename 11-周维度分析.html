<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTax 周维度分析看板 | 2026-03-20</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2e3e;--text:#e4e6ef;--text-dim:#8b8fa3;--accent:#e17055;--green:#00b894;--red:#e74c3c;--blue:#1da1f2;--wechat:#07c160;--linkedin:#0077b5;--podcast:#7b68ee;--yellow:#fdcb6e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);padding:20px}
.back-link{display:inline-block;margin-bottom:20px;color:var(--accent);text-decoration:none;font-size:14px}
.back-link:hover{text-decoration:underline}
.container{max-width:1400px;margin:0 auto}
.header{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.header h1{font-size:24px;margin-bottom:8px}
.header h1 span{color:var(--accent)}
.header .meta{font-size:13px;color:var(--text-dim)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.kpi-card .label{font-size:11px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
.kpi-card .value{font-size:28px;font-weight:700;color:var(--accent)}
.kpi-card .sub{font-size:11px;color:var(--text-dim);margin-top:4px}
.kpi-card .change{font-size:12px;margin-top:4px;font-weight:600}
.charts{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-card.full{grid-column:1/-1}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text-dim)}
.chart-container{height:350px}
.chart-container.tall{height:420px}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;overflow-x:auto}
.table-card h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text-dim)}
table{width:100%;border-collapse:collapse;min-width:800px}
th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--border);font-size:12px}
th{color:var(--text-dim);font-weight:500;text-transform:uppercase;font-size:10px;position:sticky;top:0;background:var(--card)}
td:first-child,th:first-child{text-align:left}
tr:hover td{background:rgba(255,255,255,0.03)}
.wow-up{color:var(--green)}
.wow-down{color:var(--red)}
.badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;color:#fff;display:inline-block}
.insight-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.insight-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.insight-card h3{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--accent)}
.insight-card p{font-size:13px;color:var(--text-dim);line-height:1.6}
@media(max-width:1024px){.kpi-row{grid-template-columns:repeat(2,1fr)}.charts{grid-template-columns:1fr}.insight-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back-link">← 返回导航</a>
<div class="header">
<h1><span>📅</span> 周维度分析看板</h1>
<div class="meta">FinTax 全渠道以周为单位的运营节奏分析 | 数据更新于 2026-03-20 | X平台数据已去除离群值</div>
</div>

<div class="kpi-row" id="kpis"></div>

<div class="charts">
<div class="chart-card full">
<h3>📈 每周全渠道曝光量趋势（含环比变化）</h3>
<div class="chart-container tall"><canvas id="weeklyViews"></canvas></div>
</div>
<div class="chart-card">
<h3>📊 每周各平台发布量堆叠图</h3>
<div class="chart-container"><canvas id="weeklyPosts"></canvas></div>
</div>
<div class="chart-card">
<h3>⚡ 每周全渠道互动量趋势</h3>
<div class="chart-container"><canvas id="weeklyEng"></canvas></div>
</div>
<div class="chart-card">
<h3>🎯 周均篇效（曝光/发布数）</h3>
<div class="chart-container"><canvas id="weeklyEfficiency"></canvas></div>
</div>
<div class="chart-card">
<h3>📊 各平台周曝光占比变化</h3>
<div class="chart-container"><canvas id="weeklyShare"></canvas></div>
</div>
</div>

<div class="table-card">
<h3>📋 周度数据明细表（含环比）</h3>
<div style="max-height:460px;overflow-y:auto">
<table id="weeklyTable">
<thead><tr><th>周次</th><th>发布量</th><th>WoW</th><th>总曝光</th><th>WoW</th><th>总互动</th><th>WoW</th><th>篇效</th><th>互动率</th></tr></thead>
<tbody></tbody>
</table>
</div>
</div>

<div class="insight-grid" id="insights"></div>
</div>

{"week":"2026-01-26","label":"01/26","totalPosts":10,"totalViews":1367,"totalEng":46,"cn":{"posts":5,"views":670,"eng":2},"off":{"posts":1,"views":89,"eng":0},"wc":{"posts":2,"views":510,"eng":43},"li":{"posts":2,"views":98,"eng":1},"xy":{"posts":0,"views":0,"eng":0}},

{"week":"2026-02-09","label":"02/09","totalPosts":14,"totalViews":1151,"totalEng":54,"cn":{"posts":5,"views":581,"eng":0},"off":{"posts":2,"views":175,"eng":1},"wc":{"posts":2,"views":247,"eng":33},"li":{"posts":3,"views":137,"eng":20},"xy":{"posts":2,"views":11,"eng":0}},

{"week":"2026-03-02","label":"03/02","totalPosts":4,"totalViews":285,"totalEng":23,"cn":{"posts":1,"views":57,"eng":0},"off":{"posts":0,"views":0,"eng":0},"wc":{"posts":3,"views":228,"eng":23},"li":{"posts":0,"views":0,"eng":0},"xy":{"posts":0,"views":0,"eng":0}},
{"week":"2026-03-09","label":"03/09","totalPosts":13,"totalViews":1047,"totalEng":54,"cn":{"posts":4,"views":314,"eng":0},"off":{"posts":3,"views":194,"eng":2},"wc":{"posts":3,"views":453,"eng":47},"li":{"posts":3,"views":86,"eng":5},"xy":{"posts":0,"views":0,"eng":0}},
{"week":"2026-03-16","label":"03/16","totalPosts":17,"totalViews":721,"totalEng":18,"cn":{"posts":4,"views":232,"eng":0},"off":{"posts":6,"views":226,"eng":0},"wc":{"posts":2,"views":145,"eng":13},"li":{"posts":5,"views":118,"eng":5},"xy":{"posts":0,"views":0,"eng":0}}
];

const labels = weeks.map(w => w.label);
const pColors = {cn:'#1da1f2',off:'#00acee',wc:'#07c160',li:'#0077b5',xy:'#7b68ee'};
const pNames = {cn:'X 中文号',off:'X 英文号',wc:'微信公众号',li:'LinkedIn',xy:'小宇宙'};

// ===== KPI Cards =====
const recent4 = weeks.slice(-4);
const prev4 = weeks.slice(-8, -4);
const r4Views = recent4.reduce((s,w) => s+w.totalViews, 0);
const p4Views = prev4.reduce((s,w) => s+w.totalViews, 0);
const r4Posts = recent4.reduce((s,w) => s+w.totalPosts, 0);
const p4Posts = prev4.reduce((s,w) => s+w.totalPosts, 0);
const r4Eng = recent4.reduce((s,w) => s+w.totalEng, 0);
const p4Eng = prev4.reduce((s,w) => s+w.totalEng, 0);
const avgEff = r4Views / Math.max(r4Posts,1);
const prevEff = p4Views / Math.max(p4Posts,1);

function wowPct(cur, prev) {
  if (!prev) return {text: 'N/A', cls: ''};
  const pct = ((cur - prev) / prev * 100).toFixed(1);
  return {text: (pct >= 0 ? '↑ ' : '↓ ') + Math.abs(pct) + '%', cls: pct >= 0 ? 'wow-up' : 'wow-down'};
}

const viewsWow = wowPct(r4Views, p4Views);
const postsWow = wowPct(r4Posts, p4Posts);
const engWow = wowPct(r4Eng, p4Eng);
const effWow = wowPct(avgEff, prevEff);

document.getElementById('kpis').innerHTML = `
<div class="kpi-card">
  <div class="label">近4周总曝光</div>
  <div class="value">${(r4Views/1000).toFixed(1)}K</div>
  <div class="sub">vs 上4周 ${(p4Views/1000).toFixed(1)}K</div>
  <div class="change ${viewsWow.cls}">${viewsWow.text}</div>
</div>
<div class="kpi-card">
  <div class="label">近4周发布量</div>
  <div class="value">${r4Posts}</div>
  <div class="sub">vs 上4周 ${p4Posts}</div>
  <div class="change ${postsWow.cls}">${postsWow.text}</div>
</div>
<div class="kpi-card">
  <div class="label">近4周互动量</div>
  <div class="value">${r4Eng}</div>
  <div class="sub">vs 上4周 ${p4Eng}</div>
  <div class="change ${engWow.cls}">${engWow.text}</div>
</div>
<div class="kpi-card">
  <div class="label">近4周篇效</div>
  <div class="value">${avgEff.toFixed(0)}</div>
  <div class="sub">vs 上4周 ${prevEff.toFixed(0)}</div>
  <div class="change ${effWow.cls}">${effWow.text}</div>
</div>
`;

// ===== 1. 周曝光趋势 + WoW 环比 =====
const wowArr = weeks.map((w,i) => i === 0 ? 0 : ((w.totalViews - weeks[i-1].totalViews) / Math.max(weeks[i-1].totalViews,1) * 100));

new Chart(document.getElementById('weeklyViews'), {
  type: 'bar',
  data: {
    labels,
    datasets: [
      {label: '周曝光量', data: weeks.map(w => w.totalViews), backgroundColor: '#e1705588', borderColor: '#e17055', borderWidth: 1, borderRadius: 4, yAxisID: 'y', order: 2},
      {label: '环比变化%', data: wowArr, type: 'line', borderColor: '#fdcb6e', backgroundColor: '#fdcb6e33', tension: 0.4, pointRadius: 3, pointBackgroundColor: '#fdcb6e', borderWidth: 2, yAxisID: 'y1', fill: false, order: 1}
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    interaction: {mode: 'index', intersect: false},
    plugins: {
      legend: {labels: {color: '#8b8fa3', usePointStyle: true, padding: 16}},
      annotation: {}
    },
    scales: {
      x: {ticks: {color: '#8b8fa3', maxRotation: 45}, grid: {display: false}},
      y: {position: 'left', ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}, title: {display: true, text: '曝光量', color: '#8b8fa3'}},
      y1: {position: 'right', ticks: {color: '#fdcb6e', callback: v => v+'%'}, grid: {display: false}, title: {display: true, text: '环比%', color: '#fdcb6e'}}
    }
  }
});

// ===== 2. 每周发布量堆叠图 =====
const platKeys = ['cn','off','wc','li','xy'];
new Chart(document.getElementById('weeklyPosts'), {

  data: {
    labels,
    datasets: platKeys.map(k => ({
      label: pNames[k],
      data: weeks.map(w => w[k].posts),
      backgroundColor: pColors[k] + 'bb',
      borderRadius: 2
    }))
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {legend: {labels: {color: '#8b8fa3', usePointStyle: true, padding: 10, font: {size: 10}}}},
    scales: {
      x: {stacked: true, ticks: {color: '#8b8fa3', maxRotation: 45}, grid: {display: false}},
      y: {stacked: true, ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}}

});

});

// ===== 4. 周均篇效 =====
new Chart(document.getElementById('weeklyEfficiency'), {
  type: 'line',
  data: {
    labels,
    datasets: platKeys.filter(k => k !== 'xy').map(k => ({
      label: pNames[k],
      data: weeks.map(w => w[k].posts ? Math.round(w[k].views / w[k].posts) : null),
      borderColor: pColors[k],
      backgroundColor: pColors[k] + '15',
      tension: 0.4,
      pointRadius: 3,
      pointBackgroundColor: pColors[k],
      borderWidth: 2,
      spanGaps: true
    }))
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {legend: {labels: {color: '#8b8fa3', usePointStyle: true, padding: 10, font: {size: 10}}}},
    scales: {
      x: {ticks: {color: '#8b8fa3', maxRotation: 45}, grid: {display: false}},
      y: {ticks: {color: '#8b8fa3'}, grid: {color: '#2a2e3e'}, title: {display: true, text: '篇均曝光', color: '#8b8fa3'}}
    }
  }
});

// ===== 5. 各平台周曝光占比 =====
new Chart(document.getElementById('weeklyShare'), {
  type: 'bar',
  data: {
    labels,
    datasets: platKeys.map(k => ({
      label: pNames[k],
      data: weeks.map(w => {
        const total = w.totalViews || 1;
        return (w[k].views / total * 100).toFixed(1);
      }),
      backgroundColor: pColors[k] + 'cc',
      borderRadius: 0
    }))
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: {labels: {color: '#8b8fa3', usePointStyle: true, padding: 10, font: {size: 10}}},
      tooltip: {callbacks: {label: ctx => `${ctx.dataset.label}: ${ctx.raw}%`}}
    },
    scales: {
      x: {stacked: true, ticks: {color: '#8b8fa3', maxRotation: 45}, grid: {display: false}},
      y: {stacked: true, max: 100, ticks: {color: '#8b8fa3', callback: v => v+'%'}, grid: {color: '#2a2e3e'}}
    }
  }
});

// ===== 周度明细表 =====
const tbody = document.querySelector('#weeklyTable tbody');
weeks.forEach((w, i) => {
  const prev = i > 0 ? weeks[i-1] : null;
  const vWow = prev ? ((w.totalViews - prev.totalViews) / Math.max(prev.totalViews,1) * 100) : 0;
  const pWow = prev ? ((w.totalPosts - prev.totalPosts) / Math.max(prev.totalPosts,1) * 100) : 0;
  const eWow = prev ? ((w.totalEng - prev.totalEng) / Math.max(prev.totalEng,1) * 100) : 0;
  const eff = w.totalPosts ? Math.round(w.totalViews / w.totalPosts) : 0;
  const engRate = w.totalViews ? (w.totalEng / w.totalViews * 100).toFixed(2) : '0.00';

  function fmtWow(val) {
    if (!prev) return '<td style="color:var(--text-dim)">—</td>';
    const cls = val >= 0 ? 'wow-up' : 'wow-down';
    const arrow = val >= 0 ? '↑' : '↓';
    return `<td class="${cls}">${arrow}${Math.abs(val).toFixed(1)}%</td>`;
  }

  const row = document.createElement('tr');
  row.innerHTML = `
    <td style="font-weight:600;white-space:nowrap">${w.label}</td>
    <td>${w.totalPosts}</td>
    ${fmtWow(pWow)}
    <td>${w.totalViews.toLocaleString()}</td>
    ${fmtWow(vWow)}
    <td>${w.totalEng}</td>
    ${fmtWow(eWow)}
    <td>${eff}</td>
    <td>${engRate}%</td>
  `;
  tbody.appendChild(row);
});

// ===== 洞察 =====
const peakWeek = weeks.reduce((best, w) => w.totalViews > best.totalViews ? w : best, weeks[0]);
const lowWeek = weeks.slice(5).reduce((worst, w) => w.totalViews < worst.totalViews ? w : worst, weeks[5]);
const avgPosts = (weeks.reduce((s,w) => s+w.totalPosts, 0) / weeks.length).toFixed(1);

document.getElementById('insights').innerHTML = `
<div class="insight-card">
  <h3>🔥 峰值周分析</h3>
  <p>曝光峰值出现在 ${peakWeek.label} 周，全渠道曝光 ${peakWeek.totalViews.toLocaleString()} 次，发布 ${peakWeek.totalPosts} 篇内容。该周微信公众号贡献了 ${(peakWeek.wc.views/peakWeek.totalViews*100).toFixed(0)}% 的曝光，X中文号贡献 ${(peakWeek.cn.views/peakWeek.totalViews*100).toFixed(0)}%。密集发布+优质内容是高峰核心因素。</p>
</div>
<div class="insight-card">
  <h3>📉 低谷周分析</h3>
  <p>曝光低谷出现在 ${lowWeek.label} 周，仅 ${lowWeek.totalViews} 次曝光和 ${lowWeek.totalPosts} 篇发布。低谷周通常与节假日、团队排期间隙相关。建议设定每周最低发布基准（如 8 篇），避免流量断档。</p>
</div>
<div class="insight-card">
  <h3>📊 节奏建议</h3>
  <p>过去 ${weeks.length} 周平均每周发布 ${avgPosts} 篇内容。发布量与曝光量相关系数较高，建议保持每周 10-15 篇的稳定节奏。微信公众号是曝光效率最高的平台，每周至少保证 2-3 篇推送。</p>
</div>
`;
</script>
</body>
